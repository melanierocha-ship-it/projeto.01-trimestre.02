<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Gatos - Outono & Primavera</title>
    <style>
        /* PALETA DE CORES (Outono e Primavera)
           #F4A261 (Laranja Outonal)
           #E76F51 (Terracota)
           #2A9D8F (Verde Primavera)
           #E9C46A (Amarelo Sol/Folha)
           #F4F1DE (Pérola/Fundo)
        */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #F4F1DE;
            color: #333;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        header {
            background-color: #E76F51;
            color: white;
            text-align: center;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* MENU DE NAVEGAÇÃO */
        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            background-color: #2A9D8F;
            padding: 1rem;
        }

        /* BOTÃO EM FORMATO DE PATA DE GATO */
        .btn-pata {
            position: relative;
            width: 70px;
            height: 60px;
            background-color: #F4A261;
            border-radius: 50% 50% 40% 40%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 5px rgba(0,0,0,0.2);
        }

        /* Dedinhos da pata */
        .btn-pata::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 5px;
            width: 15px;
            height: 20px;
            background-color: #F4A261;
            border-radius: 50%;
            box-shadow: 22px -5px 0 #F4A261, 44px 0px 0 #F4A261;
        }

        /* Texto/Ícone dentro do botão */
        .btn-pata span {
            display: block;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 15px;
        }
