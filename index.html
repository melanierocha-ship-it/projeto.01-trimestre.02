<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Gatos | Blog</title>
    <style>
        /* Estilos Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f6f0;
            color: #333;
            line-height: 1.6;
        }

        /* Cabeçalho */
        header {
            background-color: #ffb7b2;
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            border-bottom: 5px solid #ff9aa2;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-style: italic;
            font-size: 1.1rem;
        }

        /* Estrutura de Páginas */
        .pagina {
            display: none; /* Esconde as páginas por padrão */
        }

        .pagina.ativa {
            display: block; /* Mostra apenas a página com a classe 'ativa' */
        }

        /* Layout da Página Inicial (Grid) */
        .grid-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        /* Layout da Página de Conteúdo Único */
        .single-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Cartões de Conteúdo */
        .card {
            background: white;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 {
            color: #ff7b90;
            margin-bottom: 0.5rem;
        }

        h3 {
            color: #ff9aa2;
            margin: 1.5rem 0 0.5rem 0;
        }
